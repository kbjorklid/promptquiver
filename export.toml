text = """
-- Project should not be persisted in db

I believe the currently active project is persisted in db and synced accross all instances?

Adust this so that the active project is only held in runtime memory. Active project is the project to which new prompts are crated in (associated with), and it also functions as filter. If we have two or more sessions, they may be about two or more projects so we don't want the project switching to happen between instances.

At app start, if there are projects defined (e.g. at least one other project in addition to Default), show a modal pop-up for project selection. However, let user in settings select one of the following:
- Always start with the last previously activated project (the info about the last project activation needs to be stored in db for this to wokr)
- Always start with a specific project (let user select which one in the settings)
- Ask (the behavior described above).

$$grill-me"""
