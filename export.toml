id = "90ed6c32-72d3-465e-a341-0d5777b5cc78"
text = '''
-- deal with 'draft' in title

Add the notion of draft prompts to the system.

Note that this relies on existing functionality, where the first line of prompt, if it starts with `--` is considered the title used in the prompt list, but not used when prompt is copied to clipboard.

If a prompt is considered draft:
- Its title is dimmed in prompt list
- Its title is presented like so: `[DRAFT] Fix welcome email`
- It cannot be staged

A prompt is considered draft, if its title (after trimming whitespace) starts with:
- `Draft\s` (ignoring case)
- `[Draft]` (ignoring case)
...or if it ends with:
- `[Draft] (ignoring case)

In all other cases it is not considered a draft.

$$grill-me'''
