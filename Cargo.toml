[workspace]
resolver = "2"
members = [
    "app",
    "contracts",
    "infra",
    "ui",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
ratatui = "0.30"
crossterm = "0.29"
serde = { version = "1.0", features = ["derive"] }
serde_toml = { version = "0.8", package = "toml" }
uuid = { version = "1.13", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2.0"
anyhow = "1.0"
async-trait = "0.1"
arboard = "3.4"
directories = "6.0"
ratatui-textarea = "0.9"
# Note: ratatui-toaster and tui-popup might need specific versions, I'll check later.
# For now, let's stick to the core ones.

[workspace.lints.rust]
unsafe_code = "deny"
missing_debug_implementations = { level = "warn", priority = -1 }
rust_2018_idioms = { level = "warn", priority = -1 }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
