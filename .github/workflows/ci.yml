name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build (${{ matrix.os }} - ${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: promptquiver-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: promptquiver-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: promptquiver-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: promptquiver-macos-arm64

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/promptquiver${{ matrix.os == 'windows-latest' && '.exe' || '' }}
